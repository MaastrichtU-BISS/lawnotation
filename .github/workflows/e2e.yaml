name: E2E Tests

on:
  push:
    branches:
      - main
      - "feat-*"
      - dev
  pull_request:
    branches:
      - main
      - "feat-*"
      - dev

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    defaults:
      run:
        working-directory: ./lawnotation-ui

    env:
      SUPABASE_URL: "http://localhost:54321"
      SUPABASE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
      SUPABASE_SERVICE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
      DATABASE_URL: "postgresql://postgres:postgres@127.0.0.1:54322/postgres"
      SMTP_URL: "smtp://127.0.0.1:54325"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: lawnotation-ui/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 1.226.4

      - name: Start Supabase local stack
        run: supabase start

      - name: Wait for Supabase API
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:54321/auth/v1/health >/dev/null; then
              echo "Supabase API ready"
              exit 0
            fi
            sleep 1
          done
          echo "Supabase API not ready"
          exit 1

      - name: Show running containers
        if: always()
        run: docker ps -a

      - name: Supabase logs (auth + inbucket + db)
        if: always()
        run: |
          docker logs supabase_auth_lawnotation-ui || true
          docker logs supabase_inbucket_lawnotation-ui || true
          docker logs supabase_db_lawnotation-ui || true

      - name: Check SMTP connectivity (Inbucket)
        run: |
          for i in {1..60}; do
            if nc -z 127.0.0.1 54325; then
              echo "SMTP is reachable"
              exit 0
            fi
            sleep 1
          done
          echo "SMTP is NOT reachable"
          exit 1

      - name: Wait for Inbucket UI
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:54324/ >/dev/null; then
              echo "Inbucket is up"
              exit 0
            fi
            sleep 1
          done
          echo "Inbucket did not become ready in time"
          exit 1

      - name: Verify Supabase email delivery works (OTP -> Inbucket)
        run: |
          echo "Waiting for Supabase auth to send OTP emails..."

          EMAIL="annotator@example.com"
          MAILBOX=$(echo "$EMAIL" | cut -d'@' -f1)

          for i in {1..30}; do
            echo "Attempt $i: triggering OTP email for $EMAIL..."

            curl -s -X POST "http://localhost:54321/auth/v1/otp" \
              -H "apikey: $SUPABASE_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"email\":\"$EMAIL\",\"create_user\":true}" > /dev/null

            sleep 2

            URL="http://localhost:54324/api/v1/mailbox/$MAILBOX"
            # Capture body + status code to avoid jq failing on "File not found"
            RESPONSE=$(curl -s -w "\n%{http_code}" "$URL")
            BODY=$(echo "$RESPONSE" | head -n -1)
            CODE=$(echo "$RESPONSE" | tail -n 1)

            if [ "$CODE" != "200" ]; then
              echo "Inbucket mailbox endpoint returned HTTP $CODE"
              echo "$BODY"
              sleep 2
              continue
            fi

            if ! echo "$BODY" | jq empty 2>/dev/null; then
              echo "Inbucket returned invalid JSON"
              echo "$BODY"
              sleep 2
              continue
            fi

            COUNT=$(echo "$BODY" | jq 'length')

            if [ "$COUNT" -gt 0 ]; then
              echo "Email successfully received in Inbucket mailbox '$MAILBOX'"
              exit 0
            fi

            echo "No email yet, retrying..."
            sleep 2
          done

          echo "Supabase email system never became ready"
          docker logs --tail 200 supabase_auth_lawnotation-ui || true
          docker logs --tail 200 supabase_inbucket_lawnotation-ui || true
          exit 1

      - name: Run Playwright tests
        run: pnpm playwright

      - name: Capture docker stats (on failure)
        if: failure()
        run: docker stats --no-stream > docker-stats.txt

      - name: Upload debug artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs
          path: |
            docker-stats.txt
            test-results/
            playwright-report/

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: lawnotation-ui/playwright-report
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: lawnotation-ui/test-results
          retention-days: 30