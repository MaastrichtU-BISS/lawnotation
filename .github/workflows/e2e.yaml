name: E2E Tests

on:
  push:
    branches:
      - main
      - 'feat-*'
      - dev
  pull_request:
    branches:
      - main
      - 'feat-*'
      - dev

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: ./lawnotation-ui
    env:
          SUPABASE_URL: "http://localhost:54321"
          SUPABASE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU"
          SUPABASE_SERVICE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU"
          DATABASE_URL: "postgresql://postgres:postgres@127.0.0.1:54322/postgres"
          SMTP_URL: "smtp://127.0.0.1:54325"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: lawnotation-ui/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.90.0
      - name: Start Supabase local stack
        run:  supabase start
      - name: Wait for Inbucket mail UI
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:54324/ >/dev/null; then
              echo "Inbucket is up"
              exit 0
            fi
            sleep 1
          done
          echo "Inbucket did not become ready in time"
          exit 1
      - name: Run Playwright tests
        run: pnpm playwright
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: lawnotation-ui/playwright-report
          retention-days: 30
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: lawnotation-ui/test-results
          retention-days: 30